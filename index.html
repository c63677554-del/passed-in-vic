<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Passd — Melbourne auction pass-ins</title>
  <link rel="icon" href="./logo.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./logo.svg" />
  <meta name="description" content="A live map and list of residential properties that passed in at auction across Melbourne and Victoria — refreshed weekly from REIV, with agent price guides." />
  <meta name="theme-color" content="#e4002b" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Passd — Melbourne auction pass-ins" />
  <meta property="og:description" content="Every residential property that passed in at auction across Melbourne/VIC, on a map with price guides. Refreshed weekly." />
  <meta property="og:url" content="https://c63677554-del.github.io/passed-in-vic/" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Passd — Melbourne auction pass-ins" />
  <meta name="twitter:description" content="Every residential property that passed in at auction across Melbourne/VIC, on a map with price guides." />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app">
    <header class="header">
      <a class="brand" href="./" aria-label="Passd — Melbourne auction pass-ins">
        <svg class="logo" viewBox="0 0 24 24" width="26" height="26" aria-hidden="true">
          <path d="M12 1.5c-4.69 0-8.5 3.81-8.5 8.5 0 5.86 7.4 12.66 8.5 13.66 1.1-1 8.5-7.8 8.5-13.66 0-4.69-3.81-8.5-8.5-8.5z" fill="#e4002b"/>
          <path d="M12 6l5.2 4.4v.35H15.7V16h-2.5v-3.2h-2.4V16H8.3v-5.25H6.8v-.35z" fill="#fff"/>
        </svg>
        <span class="word">passd</span>
        <span class="tag">Melbourne auction pass-ins</span>
      </a>
      <div class="toggle" role="tablist">
        <button id="toList" class="on" type="button">List</button>
        <button id="toMap" type="button">Map</button>
      </div>
      <div class="spacer"></div>
      <span id="count" class="count" aria-live="polite"></span>
      <select id="week" aria-label="Auction week"></select>
    </header>

    <div class="filterbar">
      <span class="filterlabel">Type</span>
      <div id="typeFilter" class="types" role="group" aria-label="Filter by property type"></div>
      <span class="filterlabel">Max price</span>
      <select id="maxPrice" class="pricesel" aria-label="Maximum price"></select>
    </div>

    <div class="body">
      <aside id="list" class="list" aria-label="Passed-in properties in view"></aside>
      <div class="map">
        <div id="map" role="application" aria-label="Map of properties that passed in at auction"></div>
      </div>
    </div>

    <footer class="foot">
      <b id="fresh">Updated —</b>
      <span class="sep">·</span>
      <span>Data <a href="https://reiv.com.au" target="_blank" rel="noopener noreferrer">REIV</a>, guides <a href="https://soho.com.au" target="_blank" rel="noopener noreferrer">soho</a>, map <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener noreferrer">OSM</a></span>
      <span class="foot-spacer"></span>
      <span class="disc">Price guides are indicative &amp; change — confirm with the agent. Not financial advice.</span>
    </footer>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
